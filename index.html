<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<title>ClickSing</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div>
      <div class="brand">🎤 ClickSing</div>
      <div class="subtitle">4L · Lletres de concert</div>
    </div>
    <div class="top-actions">
      <button id="themeBtn" class="icon-btn" aria-label="Canviar tema">🌙</button>
      <button id="concertBtn" class="primary">MODE CONCERT</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="searchbox">
        <input id="searchInput" placeholder="Cercar cançó..." autocomplete="off">
      </div>
      <div class="side-actions">
        <button id="addSongBtn">＋ Afegir cançó</button>
      </div>
      <div id="songList" class="song-list"></div>
    </aside>

    <section class="content">
      <div class="song-head">
        <div>
          <div class="eyebrow">CANÇÓ ACTUAL</div>
          <h1 id="songTitle">ClickSing</h1>
        </div>
        <div class="song-actions">
          <button id="editBtn">✏️ Editar</button>
          <button id="deleteBtn" class="danger">🗑️ Eliminar</button>
        </div>
      </div>

      <div id="lyricsView" class="lyrics-view"></div>

      <div class="nav-controls">
        <button id="prevBtn">◀ Anterior</button>
        <button id="nextBtn">Següent ▶</button>
      </div>
    </section>
  </main>
</div>

<div id="editorModal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-head">
      <h2>Editar cançó</h2>
      <button id="closeEditor" class="icon-btn">✕</button>
    </div>
    <label>Títol
      <input id="editTitle">
    </label>
    <label>Lletra / indicacions
      <textarea id="editLyrics" rows="18"></textarea>
    </label>
    <div class="modal-actions">
      <button id="cancelEdit">Cancel·lar</button>
      <button id="saveEdit" class="primary">Guardar</button>
    </div>
  </div>
</div>

<div id="concertView" class="concert hidden">
  <div class="concert-top">
    <div id="concertTitle" class="concert-title"></div>
    <div class="concert-actions">
      <button id="fontDown">A−</button>
      <button id="fontUp">A＋</button>
      <button id="exitConcert" class="primary">SORTIR</button>
    </div>
  </div>
  <div id="concertLyrics" class="concert-lyrics"></div>
  <div class="concert-nav">
    <button id="concertPrev">◀</button>
    <button id="concertNext">▶</button>
  </div>
</div>

<script src="app.js" defer></script>
</body>
</html>
